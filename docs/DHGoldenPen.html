<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Đơn Đặt Hàng - Golden Pen</title>
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tải thư viện xuất PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; }
            .print-hide { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app"></div>

    <script>
        // Hàm định dạng tiền tệ
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('vi-VN').format(amount);
        };

        let orderData = null;
        let isDashboard = false;
        let error = null;

        // Khởi tạo và đọc dữ liệu từ URL
        function init() {
            const params = new URLSearchParams(window.location.search);
            
            if (!params.has('MaDonHang') && !params.has('items')) {
                isDashboard = true;
                // Dữ liệu mẫu khi mở link không có tham số
                orderData = {
                    MaDonHang: "N26-03-aa37ab20260325-094010",
                    Ngay: "25/03/2026 09:40:10",
                    TenKhachHang: "HN4_BB_NS Thanh Thắng",
                    DiaChi: "26 Đường Cao Lỗ, Tổ 4 Thị trấn Đông Anh",
                    NhanVien: "Nguyễn Văn A",
                    GhiChu: "Giao hàng trong giờ hành chính",
                    CKTM: "4",
                    CKKM: "0",
                    TongTien: "25400000",
                    items: [
                        { MaHang: "001-258", TenHang: "LR7-CX Ruột bút ký mực gel nét 0.7mm - Xanh", CK: "4", SoLuong: 576 },
                        { MaHang: "001-305", TenHang: "LR10-CX Ruột bút mực gel nét 1.0mm màu xanh", CK: "4", SoLuong: 576 },
                        { MaHang: "002-111", TenHang: "Bút bi bấm cao cấp vỏ kim loại", CK: "0", SoLuong: 100 },
                    ]
                };
            } else {
                try {
                    let items = [];
                    const itemsParam = params.get('items');
                    if (itemsParam) {
                        items = JSON.parse(itemsParam);
                    }
                    orderData = {
                        MaDonHang: params.get('MaDonHang') || '',
                        Ngay: params.get('Ngay') || '',
                        TenKhachHang: params.get('TenKhachHang') || '',
                        DiaChi: params.get('DiaChi') || '',
                        NhanVien: params.get('NhanVien') || '',
                        GhiChu: params.get('GhiChu') || '',
                        CKTM: params.get('CKTM') || '',
                        CKKM: params.get('CKKM') || '',
                        TongTien: params.get('TongTien') || '',
                        items: items
                    };
                } catch (err) {
                    error = "Lỗi: Dữ liệu 'items' không đúng định dạng JSON.";
                }
            }
            
            render();

            // Tự động in nếu có tham số autoPrint
            if (!isDashboard && params.get('autoPrint') === 'true') {
                setTimeout(() => window.print(), 500);
            }
        }

        // Tạo HTML cho tờ hóa đơn A4
        function getInvoiceHTML() {
            const totalQuantity = orderData.items.reduce((sum, item) => sum + (Number(item.SoLuong) || 0), 0);
            
            let itemsHtml = orderData.items.map((item, index) => `
                <tr style="page-break-inside: avoid">
                    <td class="border border-gray-800 p-2 text-center">${index + 1}</td>
                    <td class="border border-gray-800 p-2 text-center">${item.MaHang || ''}</td>
                    <td class="border border-gray-800 p-2">${item.TenHang || ''}</td>
                    <td class="border border-gray-800 p-2 text-center">${item.CK ? item.CK + '%' : ''}</td>
                    <td class="border border-gray-800 p-2 text-right font-semibold">${formatCurrency(Number(item.SoLuong) || 0)}</td>
                </tr>
            `).join('');

            // Thêm dòng trống cho đẹp nếu ít hàng
            const emptyRowsCount = Math.max(0, 5 - orderData.items.length);
            for(let i=0; i<emptyRowsCount; i++) {
                itemsHtml += `
                    <tr style="page-break-inside: avoid">
                        <td class="border border-gray-800 p-2 text-center text-transparent">.</td>
                        <td class="border border-gray-800 p-2"></td>
                        <td class="border border-gray-800 p-2"></td>
                        <td class="border border-gray-800 p-2"></td>
                        <td class="border border-gray-800 p-2"></td>
                    </tr>
                `;
            }

            let totalAmountHtml = '';
            if (orderData.TongTien) {
                totalAmountHtml = `
                    <tr class="font-bold bg-gray-50" style="page-break-inside: avoid">
                        <td colspan="4" class="border border-gray-800 p-2 text-right uppercase">Tổng tiền thanh toán:</td>
                        <td class="border border-gray-800 p-2 text-right text-red-600 text-base">${formatCurrency(Number(orderData.TongTien))} đ</td>
                    </tr>
                `;
            }

            return `
                <div id="invoice-content" class="bg-white mx-auto print:m-0 print:shadow-none shadow-2xl relative" 
                     style="width: 210mm; min-height: 297mm; padding: 15mm 20mm; font-family: 'Times New Roman', Times, serif; color: #000; box-sizing: border-box; font-size: 14px;">
                    
                    <!-- Header -->
                    <div class="flex justify-between items-start border-b-2 border-gray-800 pb-4 mb-6">
                        <div class="flex items-center">
                            <div class="w-20 h-20 flex-shrink-0 flex flex-col items-center justify-center mr-4">
                                <div class="relative w-14 h-14">
                                    <div class="absolute inset-0 border-4 border-orange-500 rounded-full border-t-transparent transform -rotate-45"></div>
                                    <div class="absolute inset-1 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xl">G</div>
                                </div>
                                <div class="text-orange-600 font-bold text-xs mt-1 tracking-wider">Golden Pen</div>
                            </div>
                            <div>
                                <h1 class="text-lg font-bold text-gray-800 mb-1 uppercase tracking-wide">CÔNG TY CỔ PHẦN GOLDEN PEN</h1>
                                <div class="text-xs space-y-1 text-gray-700">
                                    <p><strong>Địa chỉ:</strong> Tầng 19, Tòa nhà Nam Cường, Hà Đông, Hà Nội</p>
                                    <p><strong>Điện thoại:</strong> 024.3553.9266 / 024.3553.9268</p>
                                    <p><strong>Website:</strong> www.goldenpen.com.vn</p>
                                </div>
                            </div>
                        </div>
                        <div class="text-xs text-right italic text-gray-600">
                            <p class="font-semibold text-gray-800">Mẫu số: 01-ĐH</p>
                            <p>(Ban hành theo QĐ số...)</p>
                        </div>
                    </div>

                    <!-- Title -->
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold uppercase tracking-widest mb-2">ĐƠN ĐẶT HÀNG</h2>
                        <div class="flex justify-center gap-12 text-sm italic text-gray-600">
                            <p>Ngày: ${orderData.Ngay}</p>
                            <p>Số: ${orderData.MaDonHang}</p>
                        </div>
                    </div>

                    <!-- Customer Info -->
                    <div class="mb-6 text-sm leading-relaxed">
                        <table class="w-full">
                            <tbody>
                                <tr>
                                    <td class="w-28 font-bold align-top py-1">Khách hàng:</td>
                                    <td class="uppercase font-bold py-1">${orderData.TenKhachHang}</td>
                                    <td class="w-24 font-bold align-top py-1">Nhân viên:</td>
                                    <td class="py-1">${orderData.NhanVien}</td>
                                </tr>
                                <tr>
                                    <td class="font-bold align-top py-1">Địa chỉ:</td>
                                    <td colspan="3" class="py-1">${orderData.DiaChi}</td>
                                </tr>
                                <tr>
                                    <td class="font-bold align-top py-1">Ghi chú:</td>
                                    <td colspan="3" class="py-1">${orderData.GhiChu}</td>
                                </tr>
                                <tr>
                                    <td class="font-bold align-top py-1">Chiết khấu:</td>
                                    <td colspan="3" class="py-1">
                                        ${orderData.CKTM ? `Thương mại: ${orderData.CKTM}%` : ''} 
                                        ${orderData.CKTM && orderData.CKKM ? ' | ' : ''}
                                        ${orderData.CKKM ? `Khuyến mại: ${orderData.CKKM}%` : ''}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Table -->
                    <table class="w-full border-collapse border border-gray-800 text-sm mb-4">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="border border-gray-800 p-2 text-center w-12 font-bold">STT</th>
                                <th class="border border-gray-800 p-2 text-center w-24 font-bold">Mã vật tư</th>
                                <th class="border border-gray-800 p-2 text-center font-bold">Tên hàng</th>
                                <th class="border border-gray-800 p-2 text-center w-16 font-bold">%CK</th>
                                <th class="border border-gray-800 p-2 text-center w-24 font-bold">Số lượng</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                            <tr class="font-bold bg-gray-50" style="page-break-inside: avoid">
                                <td colspan="4" class="border border-gray-800 p-2 text-right uppercase">Tổng cộng số lượng:</td>
                                <td class="border border-gray-800 p-2 text-right text-base">${formatCurrency(totalQuantity)}</td>
                            </tr>
                            ${totalAmountHtml}
                        </tbody>
                    </table>

                    <!-- Signatures -->
                    <div class="mt-8" style="page-break-inside: avoid">
                        <div class="text-right mb-4 italic text-sm pr-8">
                            Ngày ..... tháng ..... năm 20.....
                        </div>
                        <div class="grid grid-cols-3 text-center text-sm">
                            <div>
                                <p class="font-bold mb-1">Người lập phiếu</p>
                                <p class="italic text-gray-500 mb-24">(Ký, họ tên)</p>
                                <p class="font-semibold">${orderData.NhanVien}</p>
                            </div>
                            <div>
                                <p class="font-bold mb-1">Người giao hàng</p>
                                <p class="italic text-gray-500 mb-24">(Ký, họ tên)</p>
                            </div>
                            <div>
                                <p class="font-bold mb-1">Khách hàng</p>
                                <p class="italic text-gray-500 mb-24">(Ký, họ tên)</p>
                                <p class="font-semibold">${orderData.TenKhachHang}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render giao diện
        function render() {
            const app = document.getElementById('app');
            
            if (error) {
                app.innerHTML = `
                    <div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div class="bg-white p-6 rounded-lg shadow-md max-w-md w-full text-center">
                            <h2 class="text-xl font-bold text-gray-800 mb-2 text-red-600">Lỗi Dữ Liệu</h2>
                            <p class="text-gray-600">${error}</p>
                        </div>
                    </div>
                `;
                return;
            }

            const invoiceHtml = getInvoiceHTML();

            if (isDashboard) {
                app.innerHTML = `
                    <div class="min-h-screen bg-gray-100 p-8">
                        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <!-- Left Column: Instructions -->
                            <div class="space-y-6">
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <div class="flex items-center gap-3 mb-4">
                                        <h1 class="text-2xl font-bold text-gray-800">Cấu hình In AppSheet (Golden Pen)</h1>
                                    </div>
                                    <p class="text-gray-600 mb-6">
                                        Làm theo 2 bước dưới đây để kết nối AppSheet của bạn với mẫu in A4 này trên GitHub.
                                    </p>

                                    <div class="space-y-6">
                                        <!-- Step 1 -->
                                        <div class="border-l-4 border-blue-500 pl-4">
                                            <h3 class="font-bold text-lg text-gray-800 flex items-center gap-2">
                                                <span class="bg-blue-100 text-blue-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span>
                                                Tạo Virtual Column (Bảng DON_HANG_CT)
                                            </h3>
                                            <p class="text-sm text-gray-600 mt-1 mb-3">
                                                Trong bảng <strong>DON_HANG_CT</strong>, tạo một Virtual Column tên là <code class="bg-gray-100 px-1 rounded text-red-600">JSON_String</code> với công thức:
                                            </p>
                                            <div class="relative">
                                                <pre class="bg-gray-800 text-gray-100 p-4 rounded-lg text-sm overflow-x-auto" id="code-vc">CONCATENATE(
  '{"MaHang":"', [MaHang], 
  '", "TenHang":"', [TenHang], 
  '", "CK":"', [ChietKhauThuongMai], 
  '", "SoLuong":', [SoLuong], 
  '}'
)</pre>
                                                <button onclick="copyToClipboard('code-vc', this)" class="absolute top-2 right-2 p-2 bg-gray-700 hover:bg-gray-600 rounded text-white transition-colors text-xs">Copy</button>
                                            </div>
                                        </div>

                                        <!-- Step 2 -->
                                        <div class="border-l-4 border-green-500 pl-4">
                                            <h3 class="font-bold text-lg text-gray-800 flex items-center gap-2">
                                                <span class="bg-green-100 text-green-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>
                                                Tạo Action "Go to a website" (Bảng DON_HANG)
                                            </h3>
                                            <p class="text-sm text-gray-600 mt-1 mb-3">
                                                Trong bảng <strong>DON_HANG</strong>, tạo Action kiểu <em>Go to a website</em> và dán công thức sau vào ô Target:
                                            </p>
                                            <div class="relative">
                                                <pre class="bg-gray-800 text-gray-100 p-4 rounded-lg text-sm overflow-x-auto" id="code-action">CONCATENATE(
  "https://tiendh1978.github.io/googleappsheet/DHGoldenPen.html?",
  "MaDonHang=", ENCODEURL([MaDonHang]),
  "&Ngay=", ENCODEURL([Ngay]),
  "&TenKhachHang=", ENCODEURL([TenKhachHang].[TenKhachHang]),
  "&DiaChi=", ENCODEURL([DiaChi]),
  "&NhanVien=", ENCODEURL([NVKDID]),
  "&GhiChu=", ENCODEURL([GhiChu]),
  "&CKTM=", ENCODEURL([CKThuongMai]),
  "&CKKM=", ENCODEURL([CKKhuyenMai]),
  "&TongTien=", ENCODEURL([TongTienHang]),
  "&items=", ENCODEURL(
    "[" & 
    SUBSTITUTE(TEXT(SELECT(DON_HANG_CT[JSON_String], [DHID] = [_THISROW].[ID])), " , ", ",") 
    & "]"
  )
)</pre>
                                                <button onclick="copyToClipboard('code-action', this)" class="absolute top-2 right-2 p-2 bg-gray-700 hover:bg-gray-600 rounded text-white transition-colors text-xs">Copy</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Column: Preview -->
                            <div>
                                <div class="bg-white p-4 rounded-t-xl border-b border-gray-200 flex justify-between items-center">
                                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                                        Bản xem trước (A4)
                                    </h2>
                                    <div class="flex gap-2">
                                        <button onclick="downloadPDF()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md transition-colors font-medium text-sm">
                                            Tải PDF
                                        </button>
                                        <button onclick="window.print()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors font-medium text-sm">
                                            In thử
                                        </button>
                                    </div>
                                </div>
                                <div class="border border-gray-300 shadow-xl overflow-hidden bg-white flex justify-center p-4 bg-gray-100">
                                    <div class="transform scale-[0.6] origin-top">
                                        ${invoiceHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <div class="min-h-screen bg-gray-200 py-8 print:py-0 print:bg-white">
                        <!-- Control Panel -->
                        <div class="max-w-[210mm] mx-auto mb-4 print-hide flex justify-between items-center bg-white p-4 rounded-lg shadow-sm">
                            <div class="text-sm text-gray-500">Sẵn sàng in (Khổ A4)</div>
                            <div class="flex gap-2">
                                <button onclick="downloadPDF()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md transition-colors font-medium">
                                    Tải PDF
                                </button>
                                <button onclick="window.print()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors font-medium">
                                    In Đơn Hàng
                                </button>
                            </div>
                        </div>

                        <div class="flex justify-center">
                            ${invoiceHtml}
                        </div>
                    </div>
                `;
            }
        }

        // Hàm Copy
        function copyToClipboard(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = 'Đã copy!';
                btn.classList.add('text-green-400');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('text-green-400');
                }, 2000);
            });
        }

        // Hàm tải PDF (ĐÃ ĐƯỢC FIX LỖI LỆCH TRÊN PC)
       // Hàm tải PDF (ĐÃ FIX LỖI LỆCH TRÁI TRÊN PC)
        function downloadPDF() {
    const element = document.getElementById('invoice-content');
    if (!element) return;

    const maDon = orderData.MaDonHang || 'Moi';
    const fileName = `DonDatHang_${maDon}.pdf`;

    // Kích thước A4 chuẩn ở 96 DPI
    const A4_WIDTH_PX = 794;
    const A4_HEIGHT_PX = 1123;

    const opt = {
        margin: 0,
        filename: fileName,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 2,
            useCORS: true,
            letterRendering: true,
            scrollX: 0,
            scrollY: 0,
            windowWidth: A4_WIDTH_PX,
            windowHeight: A4_HEIGHT_PX,
            onclone: function (clonedDoc, elementClone) {
                // Tìm phần tử #invoice-content trong bản clone
                const el = clonedDoc.getElementById('invoice-content');
                if (el) {
                    // Loại bỏ mọi margin/padding gốc, set width cứng bằng px
                    el.style.margin = '0';
                    el.style.padding = '0';
                    el.style.width = `${A4_WIDTH_PX}px`;
                    el.style.minHeight = `${A4_HEIGHT_PX}px`;
                    el.style.position = 'absolute';
                    el.style.left = '0';
                    el.style.top = '0';
                    el.style.boxSizing = 'border-box';
                    
                    // Chuyển đổi padding từ mm sang px (1mm ≈ 3.779px)
                    const paddingTop = 15 * 3.779;   // 15mm -> ~56.7px
                    const paddingRight = 20 * 3.779; // 20mm -> ~75.6px
                    const paddingBottom = 15 * 3.779;
                    const paddingLeft = 20 * 3.779;
                    el.style.padding = `${paddingTop}px ${paddingRight}px ${paddingBottom}px ${paddingLeft}px`;
                    
                    // Đảm bảo tất cả nội dung bên trong không bị scale
                    el.style.transform = 'none';
                }
            }
        },
        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        }
    };

    html2pdf().set(opt).from(element).save();
}

        // Chạy ứng dụng
        init();
    </script>
</body>
</html>
